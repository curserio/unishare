name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -buildvcs=false ./...

      - name: Validate static assets
        run: |
          python3 -m json.tool static/manifest.webmanifest >/dev/null
          node --check static/js/api.js
          node --check static/js/app.js
          node --check static/js/i18n.js
          node --check static/js/theme.js
          node --check static/js/ui.js

      - name: Build Docker image
        run: docker build -t unishare:ci .
